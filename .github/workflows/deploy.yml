name: Deploy to Master VM

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MASTER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.MASTER_IP }} >> ~/.ssh/known_hosts 2>/dev/null
      
      - name: Run deployment script
        run: |
          bash scripts/deploy-to-master.sh ${{ secrets.MASTER_IP }} ~/.ssh/id_rsa
      
      - name: Verify deployment
        run: |
          echo "Checking backend health..."
          curl -f http://${{ secrets.MASTER_IP }}/api/health || echo "⚠️  Backend not ready yet"
        continue-on-error: true

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Notify deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful"
            echo "Access at: http://${{ secrets.MASTER_IP }}/"
          else
            echo "❌ Deployment failed"
          fi
