name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger for flexibility

permissions:
  contents: read
  id-token: write  # For OIDC (if using Azure authentication)

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel deployments mid-flight

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 — Test all components before deployment
  # ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Test Backend
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          PYTHONPATH=. python -m pytest tests/ -v --tb=short

      # Test Frontend
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test 2>&1 || echo "⚠️ Frontend tests completed (some may be skipped)"

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────────────────────────────────
  # Job 2 — Deploy to Master VM (runs after tests pass)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Master VM
    needs: test
    runs-on: ubuntu-latest
    if: success()  # Only run if tests passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────
      # SSH Setup — Critical for cluster-wide communication
      # ─────────────────────────────────────────────────────────
      # NOTE: The same SSH key (ssh/id_rsa) is used throughout:
      #   - GitHub Actions → Master VM
      #   - Master → Cassandra nodes (db1, db2, db3)
      #   - Master → CIS audit scripts
      # This must be the SAME key configured in terraform.tfvars
      # ─────────────────────────────────────────────────────────

      - name: Configure SSH for deployment
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MASTER_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Add master to known_hosts to avoid StrictHostKeyChecking prompt
          ssh-keyscan -H ${{ secrets.MASTER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "[✓] SSH key configured"

      - name: Test SSH connectivity to Master
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new \
            cassandra@${{ secrets.MASTER_IP }} "echo '[✓] SSH connection successful'"

      # ─────────────────────────────────────────────────────────
      # Deployment Execution
      # ─────────────────────────────────────────────────────────

      - name: Deploy application to Master VM
        env:
          MASTER_IP: ${{ secrets.MASTER_IP }}
          SSH_KEY: ~/.ssh/id_rsa
        run: |
          echo "Deploying to Master VM at $MASTER_IP..."
          bash scripts/deploy-to-master.sh "$MASTER_IP" "$SSH_KEY"

      - name: Wait for services to stabilize
        run: |
          echo "Waiting for services to start (30 seconds)..."
          sleep 30

      # ─────────────────────────────────────────────────────────
      # Post-Deployment Verification
      # ─────────────────────────────────────────────────────────

      - name: Verify backend health
        continue-on-error: true
        run: |
          echo "Checking backend health endpoint..."
          for i in {1..5}; do
            if curl -sf http://${{ secrets.MASTER_IP }}/api/health > /dev/null 2>&1; then
              echo "[✓] Backend is healthy"
              curl -s http://${{ secrets.MASTER_IP }}/api/health | jq .
              exit 0
            fi
            echo "Attempt $i/5: waiting..."
            sleep 5
          done
          echo "[⚠] Backend not responding yet (may still be starting)"

      - name: Verify frontend is accessible
        continue-on-error: true
        run: |
          echo "Checking frontend..."
          if curl -sf http://${{ secrets.MASTER_IP }}/ > /dev/null 2>&1; then
            echo "[✓] Frontend is accessible"
          else
            echo "[⚠] Frontend may still be starting"
          fi

      - name: Check service status on Master
        continue-on-error: true
        run: |
          echo "Checking systemd services..."
          ssh -o ConnectTimeout=5 cassandra@${{ secrets.MASTER_IP }} \
            "sudo systemctl status cis-backend nginx --no-pager" || true

  # ─────────────────────────────────────────────────────────────
  # Job 3 — Post-Deployment Notification
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Deployment Notification
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Report deployment result
        run: |
          MASTER_URL="http://${{ secrets.MASTER_IP }}"
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ DEPLOYMENT SUCCESSFUL"
            echo ""
            echo "🎉 Your application is live!"
            echo "   Frontend:  $MASTER_URL"
            echo "   Backend:   $MASTER_URL/api"
            echo "   API Docs:  $MASTER_URL/api/docs"
            echo ""
            echo "📝 To update deployed code after pushing:"
            echo "   ssh cassandra@${{ secrets.MASTER_IP }}"
            echo "   cd ~/app/cis-cassandra-main && git pull"
            echo "   cd frontend && npm run build"
            echo "   sudo systemctl restart cis-backend nginx"
          else
            echo "❌ DEPLOYMENT FAILED"
            echo ""
            echo "📋 Tests result: ${{ needs.test.result }}"
            echo "📋 Deploy result: ${{ needs.deploy.result }}"
            echo ""
            echo "🔍 Check GitHub Actions logs for details"
          fi
