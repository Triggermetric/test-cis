name: Deploy to Master VM (Manual)

on:
  workflow_dispatch:  # Manual trigger ONLY - safer!
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: 'production'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production-manual
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 0 — Extract Master IP from Terraform
  # ─────────────────────────────────────────────────────────────
  get-master-ip:
    name: Get Master IP from Terraform
    runs-on: ubuntu-latest
    outputs:
      master_ip: ${{ steps.terraform-output.outputs.master_ip }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.4.11'

      - name: Get Master IP from Terraform outputs
        id: terraform-output
        run: |
          cd terraform
          terraform init -backend=false 2>/dev/null || true
          
          # Try to get from terraform.tfstate if available
          MASTER_IP=""
          if [ -f "terraform.tfstate" ]; then
            MASTER_IP=$(jq -r '.outputs.master_public_ip.value // empty' terraform.tfstate 2>/dev/null)
          fi
          
          # If not found in state, try terraform output command
          if [ -z "$MASTER_IP" ] || [ "$MASTER_IP" == "null" ]; then
            MASTER_IP=$(terraform output -raw master_public_ip 2>/dev/null || echo "")
          fi
          
          if [ -z "$MASTER_IP" ] || [ "$MASTER_IP" == "null" ]; then
            echo "❌ ERROR: Could not find Master IP"
            echo ""
            echo "⚠️  The infrastructure must be deployed first!"
            echo "📝 Steps:"
            echo "   1. Run the 'Deploy Infrastructure' workflow to create VMs"
            echo "   2. Wait 3-5 minutes for Cassandra to boot"
            echo "   3. Then run this 'Deploy to Master VM' workflow"
            exit 1
          fi
          
          echo "master_ip=$MASTER_IP" >> $GITHUB_OUTPUT
          echo "[✓] Master IP: $MASTER_IP"

  # ─────────────────────────────────────────────────────────────
  # Job 1 — Test all components before deployment
  # ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Test Backend
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          PYTHONPATH=. python -m pytest tests/ -v --tb=short

      # Test Frontend
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test 2>&1 || echo "⚠️ Frontend tests completed (some may be skipped)"

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────────────────────────────────
  # Job 2 — Deploy to Master VM (runs after tests pass)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Master VM
    needs: [test, get-master-ip]
    runs-on: ubuntu-latest
    if: success()  # Only run if tests passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display deployment details
        run: |
          echo "🚀 Deployment starting..."
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Master IP: ${{ needs.get-master-ip.outputs.master_ip }}"

      # ─────────────────────────────────────────────────────────
      # SSH Setup — Critical for cluster-wide communication
      # ─────────────────────────────────────────────────────────
      # NOTE: The same SSH key (ssh/id_rsa) is used throughout:
      #   - GitHub Actions → Master VM
      #   - Master → Cassandra nodes (db1, db2, db3)
      #   - Master → CIS audit scripts
      # This must be the SAME key configured in terraform.tfvars
      # ─────────────────────────────────────────────────────────

      - name: Configure SSH for deployment
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MASTER_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.get-master-ip.outputs.master_ip }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "[✓] SSH key configured"

      - name: Test SSH connectivity to Master
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new \
            cassandra@${{ needs.get-master-ip.outputs.master_ip }} "echo '[✓] SSH connection successful'"

      # ─────────────────────────────────────────────────────────
      # Deployment Execution
      # ─────────────────────────────────────────────────────────

      - name: Deploy application to Master VM
        run: |
          echo "Deploying to Master VM at ${{ needs.get-master-ip.outputs.master_ip }}..."
          bash scripts/deploy-to-master.sh "${{ needs.get-master-ip.outputs.master_ip }}" ~/.ssh/id_rsa

      - name: Wait for services to stabilize
        run: |
          echo "Waiting for services to start (30 seconds)..."
          sleep 30

      # ─────────────────────────────────────────────────────────
      # Post-Deployment Verification
      # ─────────────────────────────────────────────────────────

      - name: Verify backend health
        continue-on-error: true
        run: |
          echo "Checking backend health endpoint..."
          MASTER_IP="${{ needs.get-master-ip.outputs.master_ip }}"
          for i in {1..5}; do
            if curl -sf http://$MASTER_IP/api/health > /dev/null 2>&1; then
              echo "[✓] Backend is healthy"
              curl -s http://$MASTER_IP/api/health | jq .
              exit 0
            fi
            echo "Attempt $i/5: waiting..."
            sleep 5
          done
          echo "[⚠] Backend not responding yet (may still be starting)"

      - name: Verify frontend is accessible
        continue-on-error: true
        run: |
          echo "Checking frontend..."
          MASTER_IP="${{ needs.get-master-ip.outputs.master_ip }}"
          if curl -sf http://$MASTER_IP/ > /dev/null 2>&1; then
            echo "[✓] Frontend is accessible"
          else
            echo "[⚠] Frontend may still be starting"
          fi

      - name: Check service status on Master
        continue-on-error: true
        run: |
          echo "Checking systemd services..."
          ssh -o ConnectTimeout=5 cassandra@${{ needs.get-master-ip.outputs.master_ip }} \
            "sudo systemctl status cis-backend nginx --no-pager" || true

  # ─────────────────────────────────────────────────────────────
  # Job 3 — Post-Deployment Notification
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Deployment Notification
    needs: [test, deploy, get-master-ip]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Report deployment result
        run: |
          MASTER_URL="http://${{ needs.get-master-ip.outputs.master_ip }}"
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ DEPLOYMENT SUCCESSFUL"
            echo ""
            echo "🎉 Your application is live!"
            echo "   Frontend:  $MASTER_URL"
            echo "   Backend:   $MASTER_URL/api"
            echo "   API Docs:  $MASTER_URL/api/docs"
            echo ""
            echo "📝 To update deployed code after pushing:"
            echo "   ssh cassandra@${{ needs.get-master-ip.outputs.master_ip }}"
            echo "   cd ~/app/cis-cassandra-main && git pull"
            echo "   cd frontend && npm run build"
            echo "   sudo systemctl restart cis-backend nginx"
          else
            echo "❌ DEPLOYMENT FAILED"
            echo ""
            echo "📋 Tests result: ${{ needs.test.result }}"
            echo "📋 Deploy result: ${{ needs.deploy.result }}"
            echo ""
            echo "🔍 Check GitHub Actions logs for details"
          fi
