name: Destroy Infrastructure (Terraform)

on:
  workflow_dispatch:  # Manual trigger only — no automatic destruction!
    inputs:
      confirmation:
        description: 'Type "destroy-all-infrastructure" to confirm'
        required: true
        default: ''

permissions:
  contents: read
  id-token: write  # For OIDC Azure authentication

jobs:
  # ─────────────────────────────────────────────────────────────
  # Safety Check — Prevent accidental destruction
  # ─────────────────────────────────────────────────────────────
  safety-check:
    name: Safety Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Verify destruction confirmation
        run: |
          CONFIRMATION="${{ github.event.inputs.confirmation }}"
          if [ "$CONFIRMATION" != "destroy-all-infrastructure" ]; then
            echo "❌ DESTRUCTION CANCELLED"
            echo ""
            echo "Safety check failed. You must enter exactly:"
            echo "  destroy-all-infrastructure"
            echo ""
            echo "Provided: '$CONFIRMATION'"
            exit 1
          fi
          echo "✓ Safety check passed"

      - name: Show destruction warning
        run: |
          echo "⚠️  DESTRUCTION CONFIRMED"
          echo ""
          echo "The following will be PERMANENTLY DELETED:"
          echo "  ❌ ALL VMs (master, db1, db2, db3)"
          echo "  ❌ ALL Virtual Networks and subnets"
          echo "  ❌ ALL Network Security Groups"
          echo "  ❌ ALL Storage accounts and data"
          echo "  ❌ Key Vault and all secrets"
          echo ""
          echo "⚠️  THIS CANNOT BE UNDONE"
          echo ""
          echo "Proceeding with infrastructure destruction..."

  # ─────────────────────────────────────────────────────────────
  # Backup Configuration (optional but recommended)
  # ─────────────────────────────────────────────────────────────
  backup-config:
    name: Backup Configuration Before Destruction
    needs: safety-check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Archive terraform state
        run: |
          if [ -f terraform/terraform.tfstate ]; then
            echo "📦 Backing up terraform state..."
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            mkdir -p .destroy-backups
            cp terraform/terraform.tfstate .destroy-backups/tfstate_${TIMESTAMP}.backup
            cp terraform/terraform.tfstate.backup .destroy-backups/tfstate_${TIMESTAMP}.bak
            echo "[✓] State files backed up"
          else
            echo "[ℹ] No terraform state found to backup"
          fi

      - name: Upload backup artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-backup
          path: .destroy-backups/
          retention-days: 90

  # ─────────────────────────────────────────────────────────────
  # Terraform Destruction
  # ─────────────────────────────────────────────────────────────
  terraform-destroy:
    name: Execute Terraform Destroy
    needs: [safety-check, backup-config]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Download Terraform state
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: terraform/
        continue-on-error: true

      # ─────────────────────────────────────────────────────────
      # Azure Authentication via OIDC
      # ─────────────────────────────────────────────────────────
      # One-time setup required (see SETUP.md):
      # 1. Run: az ad app create --display-name "cis-cassandra-github-actions"
      # 2. Create OIDC federated credential
      # 3. Set GitHub Secrets:
      #    - AZURE_CLIENT_ID (Application ID)
      #    - AZURE_TENANT_ID (Tenant ID)
      #    - AZURE_SUBSCRIPTION_ID (Subscription ID)
      # ─────────────────────────────────────────────────────────

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare Terraform variables and SSH key
        run: |
          set -e
          mkdir -p terraform/ssh

          if [ -z "${{ secrets.MASTER_SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: MASTER_SSH_PRIVATE_KEY secret is required"
            exit 1
          fi

          echo "${{ secrets.MASTER_SSH_PRIVATE_KEY }}" > terraform/ssh/id_rsa
          chmod 600 terraform/ssh/id_rsa
          ssh-keygen -y -f terraform/ssh/id_rsa > terraform/ssh/id_rsa.pub

          cat > terraform/terraform.tfvars <<EOF
          project_name        = "cis-cassandra"
          resource_group_name = "cis-cassandra-rg"
          location             = "Korea Central"
          secondary_location   = "Southeast Asia"
          vm_size              = "Standard_B2as_v2"
          ssh_public_key_path  = "ssh/id_rsa.pub"
          allowed_ssh_ips      = ["0.0.0.0/0"]
          EOF

      - name: Initialize Terraform
        run: |
          cd terraform
          terraform init -input=false
          echo "[✓] Terraform initialized"

      - name: Validate Terraform configuration
        run: |
          cd terraform
          terraform validate
          echo "[✓] Configuration is valid"

      - name: Show what will be destroyed
        continue-on-error: true
        run: |
          cd terraform
          echo "Resources to be destroyed:"
          terraform plan -destroy -var-file=terraform.tfvars -input=false | grep -E "^\s*(will be destroyed|Plan:)" || true

      - name: Execute Terraform Destroy
        run: |
          cd terraform
          echo "🔥 DESTROYING INFRASTRUCTURE..."
          terraform destroy -var-file=terraform.tfvars -auto-approve -input=false
          echo "[✓] Infrastructure destruction complete"

      - name: Verify destruction
        continue-on-error: true
        run: |
          cd terraform
          echo "Verifying that infrastructure is gone..."
          RESOURCE_COUNT=$(terraform state list 2>/dev/null | wc -l)
          if [ "$RESOURCE_COUNT" -eq 0 ]; then
            echo "[✓] All resources destroyed (0 resources in state)"
          else
            echo "[⚠] $RESOURCE_COUNT resources still in state (may be expected)"
          fi

  # ─────────────────────────────────────────────────────────────
  # Cleanup Notifications
  # ─────────────────────────────────────────────────────────────
  cleanup-report:
    name: Destruction Report
    needs: [terraform-destroy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate cleanup report
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "INFRASTRUCTURE DESTRUCTION REPORT"
          echo "════════════════════════════════════════════════════════"
          echo ""
          if [ "${{ needs.terraform-destroy.result }}" == "success" ]; then
            echo "✅ INFRASTRUCTURE DESTROYED SUCCESSFULLY"
            echo ""
            echo "Deleted components:"
            echo "  • Master VM (management & frontend/backend)"
            echo "  • DB1, DB2, DB3 (Cassandra cluster nodes)"
            echo "  • Primary VNet (10.0.0.0/16)"
            echo "  • Secondary VNet (10.1.0.0/16)"
            echo "  • Network Security Groups"
            echo "  • Key Vault and secrets"
            echo "  • Storage accounts"
            echo ""
            echo "ℹ️  Your local code is preserved in Git"
            echo "ℹ️  Terraform state backup saved as artifact"
          else
            echo "❌ DESTRUCTION FAILED"
            echo ""
            echo "Result: ${{ needs.terraform-destroy.result }}"
            echo ""
            echo "⚠️  Some resources may still exist"
            echo "🔧 Manual cleanup may be required:"
            echo "   1. Check Azure Portal for orphaned resources"
            echo "   2. Run locally: cd terraform && terraform destroy -auto-approve"
          fi
          echo ""
          echo "════════════════════════════════════════════════════════"

      - name: Post-destruction cleanup commands (for reference)
        run: |
          echo ""
          echo "📝 To redeploy infrastructure after this:"
          echo "   1. Update terraform/terraform.tfvars with new IPs"
          echo "   2. Run: cd terraform && terraform init && terraform apply"
          echo "   3. Update GitHub Secrets with new MASTER_IP"
          echo "   4. Push to main branch to auto-deploy"
